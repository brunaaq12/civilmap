<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CVILMAP — Gestão de Obras Civis</title>
  <meta name="description" content="Sistema de gestão e mapeamento de obras civis — Salvador, Bahia" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Auth Screen -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-bg"></div>
    <div class="auth-card" id="auth-card"></div>
  </div>

  <!-- Main App -->
  <div id="app" style="display:none;">
    <header id="header"></header>
    <div class="main-layout">
      <aside id="sidebar"></aside>
      <div id="map-container"></div>
    </div>
  </div>

  <!-- Overlays -->
  <div id="overlay-obra" class="overlay" style="display:none;"></div>
  <div id="overlay-cad" class="overlay" style="display:none;"></div>
  <div id="overlay-rel" class="overlay" style="display:none;"></div>

  <script src="app.js"></script>
</body>
</html>
